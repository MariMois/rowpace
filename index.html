<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>RowPace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap');
        
        :root { --slate-950: #020617; }
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--slate-950); 
            margin: 0; padding: 0; 
            -webkit-font-smoothing: antialiased;
            overscroll-behavior-y: contain;
            color: #f1f5f9;
        }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        html, body, #root { height: 100%; width: 100%; overflow: hidden; position: fixed; }
        #root { display: flex; flex-direction: column; }
        .scroll-container { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .picker-btn { -webkit-tap-highlight-color: transparent; }
        .overlay { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 9999; background: var(--slate-950); }
        .progress-transition { transition: width 0.5s linear; }
    </style>
</head>
<body>
    <div id="root">
        <div class="overlay">
            <div class="text-blue-500 animate-spin mb-4 font-mono">LOADING...</div>
        </div>
    </div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        const Icon = ({ name, className = "", size = 24 }) => {
            const ref = useRef(null);
            useEffect(() => {
                if (ref.current && window.lucide) {
                    const lucideName = name.replace(/([A-Z])/g, "-$1").toLowerCase().replace(/^-/, "");
                    ref.current.innerHTML = '';
                    const i = document.createElement('i');
                    i.setAttribute('data-lucide', lucideName);
                    ref.current.appendChild(i);
                    window.lucide.createIcons({ elements: [i], attrs: { width: size, height: size, 'stroke-width': 2 } });
                }
            }, [name, size]);
            return <span ref={ref} className={`inline-flex items-center justify-center ${className}`} style={{ width: size, height: size }} />;
        };

        const App = () => {
            const [startRpm, setStartRpm] = useState(18);
            const [maxRpm, setMaxRpm] = useState(24);
            const [totalMinutes, setTotalMinutes] = useState(20);
            const [splitMinutes, setSplitMinutes] = useState(1);
            const [warmupMinutes, setWarmupMinutes] = useState(5);
            const [warmupRpm, setWarmupRpm] = useState(16);
            const [cooldownMinutes, setCooldownMinutes] = useState(5);
            const [cooldownRpm, setCooldownRpm] = useState(16);

            const [isRunning, setIsRunning] = useState(false);
            const [isCountingDown, setIsCountingDown] = useState(false);
            const [countdown, setCountdown] = useState(10);
            const [currentTime, setCurrentTime] = useState(0); 
            const [showSettings, setShowSettings] = useState(true);
            const [showHistory, setShowHistory] = useState(false);
            const [history, setHistory] = useState([]);
            const [isMuted, setIsMuted] = useState(false);
            const [strokePhase, setStrokePhase] = useState(0);

            const audioCtxRef = useRef(null);
            const lastTimeRef = useRef();
            const requestRef = useRef();
            const lastSplitRef = useRef(-1);
            const phaseRef = useRef('');
            const rpmStep = 2;

            const playTone = (freq, duration, volume = 0.1, type = 'sine') => {
                if (isMuted) return;
                try {
                    const ctx = audioCtxRef.current || (audioCtxRef.current = new (window.AudioContext || window.webkitAudioContext)());
                    if (ctx.state === 'suspended') ctx.resume();
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = type;
                    osc.frequency.setValueAtTime(freq, ctx.currentTime);
                    gain.gain.setValueAtTime(volume, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + duration);
                    osc.connect(gain); gain.connect(ctx.destination);
                    osc.start(); osc.stop(ctx.currentTime + duration);
                } catch(e) {}
            };

            const soundCatch = () => playTone(800, 0.1, 0.2, 'square');
            const soundPush = () => { playTone(500, 0.2); setTimeout(() => playTone(700, 0.2), 100); };

            const handleRpmChange = (type, delta) => {
                if (type === 'start') setStartRpm(s => Math.max(10, s + delta));
                else setMaxRpm(m => Math.max(startRpm, m + delta));
            };

            const warmupSeconds = warmupMinutes * 60;
            const mainSeconds = totalMinutes * 60;
            const cooldownSeconds = cooldownMinutes * 60;
            const absoluteTotalSeconds = warmupSeconds + mainSeconds + cooldownSeconds;
            const splitSeconds = splitMinutes * 60;

            let currentPhase = 'MAIN';
            let displayRpm = startRpm;
            let splitLabel = '';
            let splitColor = 'bg-blue-600';
            let splitTimeLeft = 0;
            let activeSplitIndex = 0;

            if (currentTime < warmupSeconds && warmupSeconds > 0) {
                currentPhase = 'WARMUP'; displayRpm = warmupRpm; splitLabel = 'WARMUP'; splitColor = 'bg-emerald-600'; splitTimeLeft = warmupSeconds - currentTime;
            } else if (currentTime < warmupSeconds + mainSeconds) {
                const mainTime = currentTime - warmupSeconds;
                activeSplitIndex = Math.floor(mainTime / splitSeconds);
                displayRpm = Math.min(startRpm + (Math.floor(activeSplitIndex / 2) * rpmStep), maxRpm);
                splitLabel = activeSplitIndex % 2 !== 0 ? 'HARD DRIVE' : 'LOW STEADY';
                splitColor = activeSplitIndex % 2 !== 0 ? 'bg-orange-600' : 'bg-blue-600';
                splitTimeLeft = splitSeconds - (mainTime % splitSeconds);
            } else {
                currentPhase = 'COOLDOWN'; displayRpm = cooldownRpm; splitLabel = 'COOLDOWN'; splitColor = 'bg-teal-600'; splitTimeLeft = absoluteTotalSeconds - currentTime;
            }

            const strokeDuration = 60 / displayRpm;
            const timeToMax = (Math.ceil((maxRpm - startRpm) / rpmStep) + 1) * splitMinutes * 2;

            const animate = useCallback((time) => {
                if (lastTimeRef.current !== undefined) {
                    const deltaTime = (time - lastTimeRef.current) / 1000;
                    setCurrentTime(prev => Math.min(prev + deltaTime, absoluteTotalSeconds));
                    setStrokePhase(prev => {
                        const next = (prev + (deltaTime / strokeDuration)) % 1;
                        if (next < prev) soundCatch();
                        return next;
                    });
                }
                lastTimeRef.current = time;
                requestRef.current = requestAnimationFrame(animate);
            }, [strokeDuration, absoluteTotalSeconds]);

            useEffect(() => {
                if (isRunning && !isCountingDown) requestRef.current = requestAnimationFrame(animate);
                else { cancelAnimationFrame(requestRef.current); lastTimeRef.current = undefined; }
                return () => cancelAnimationFrame(requestRef.current);
            }, [isRunning, isCountingDown, animate]);

            useEffect(() => {
                if (isRunning && currentPhase !== phaseRef.current) { soundPush(); phaseRef.current = currentPhase; }
            }, [currentPhase, isRunning]);

            const Picker = ({ label, value, onDown, onUp, unit = "" }) => (
                <div className="flex-1 space-y-2">
                    <label className="text-[10px] font-bold text-emerald-500 uppercase tracking-widest">{label}</label>
                    <div className="flex items-center justify-between bg-slate-900/50 rounded-xl border border-slate-800 p-1">
                        <button onClick={onDown} className="p-3 hover:bg-slate-800 rounded-lg transition-colors"><Icon name="ChevronDown" size={20}/></button>
                        <span className="text-xl font-mono font-bold">{value}{unit}</span>
                        <button onClick={onUp} className="p-3 hover:bg-slate-800 rounded-lg transition-colors"><Icon name="ChevronUp" size={20}/></button>
                    </div>
                </div>
            );

            return (
                <div className="flex flex-col h-full w-full bg-slate-950 overflow-hidden">
                    <header className="p-4 flex justify-between items-center border-b border-slate-800 bg-slate-900/20 z-30">
                        <div className="flex items-center gap-3"><Icon name="Activity" className="text-blue-500" size={28}/><h1 className="text-2xl font-black tracking-tight">RowPace</h1></div>
                        <div className="flex gap-1">
                            <button onClick={() => setIsMuted(!isMuted)} className="p-2 hover:bg-slate-800 rounded-lg">{isMuted ? <Icon name="VolumeX" className="text-red-500"/> : <Icon name="Volume2"/>}</button>
                            <button onClick={() => {setShowHistory(!showHistory); setShowSettings(false);}} className="p-2 hover:bg-slate-800 rounded-lg"><Icon name="History"/></button>
                            <button onClick={() => {setShowSettings(!showSettings); setShowHistory(false);}} className="p-2 hover:bg-slate-800 rounded-lg"><Icon name="Settings"/></button>
                        </div>
                    </header>

                    <div className="scroll-container relative flex flex-col">
                        {isCountingDown && (
                            <div className="fixed inset-0 z-50 bg-blue-600 flex flex-col items-center justify-center">
                                <div className="text-xl uppercase tracking-[0.3em] font-bold mb-4 opacity-80">GET READY</div>
                                <div className="text-[45vmin] font-mono font-bold leading-none">{countdown}</div>
                            </div>
                        )}

                        {showSettings && (
                            <div className="p-6 space-y-8 max-w-lg mx-auto w-full pb-40">
                                <h2 className="text-4xl font-black text-center mt-4">Session Setup</h2>
                                
                                <div className="space-y-4">
                                    <h3 className="text-xs font-black text-emerald-500 tracking-[0.2em] uppercase border-b border-slate-800 pb-2">1. Warmup (Optional)</h3>
                                    <div className="flex gap-4">
                                        <Picker label="TIME" value={warmupMinutes} onDown={()=>setWarmupMinutes(m=>Math.max(0,m-1))} onUp={()=>setWarmupMinutes(m=>m+1)} unit="m"/>
                                        <Picker label="TARGET RPM" value={warmupRpm} onDown={()=>setWarmupRpm(r=>Math.max(10,r-1))} onUp={()=>setWarmupRpm(r=>r+1)}/>
                                    </div>
                                </div>

                                <div className="space-y-4">
                                    <h3 className="text-xs font-black text-blue-500 tracking-[0.2em] uppercase border-b border-slate-800 pb-2">2. Main Workout</h3>
                                    <div className="flex gap-4">
                                        <Picker label="START RPM" value={startRpm} onDown={()=>handleRpmChange('start',-2)} onUp={()=>handleRpmChange('start',2)}/>
                                        <Picker label="MAX RPM" value={maxRpm} onDown={()=>handleRpmChange('max',-2)} onUp={()=>handleRpmChange('max',2)}/>
                                    </div>
                                    <Picker label="MAIN DURATION" value={totalMinutes} onDown={()=>setTotalMinutes(m=>Math.max(2,m-1))} onUp={()=>setTotalMinutes(m=>m+1)} unit="m"/>
                                    <div className="bg-blue-500/5 border border-blue-500/20 p-4 rounded-xl text-center">
                                        <div className="text-[10px] font-bold text-blue-400 uppercase tracking-[0.1em] mb-1">Progression Details</div>
                                        <div className="text-xs text-slate-400 font-medium">Main RPM increases by <span className="text-white">+2</span> every 2 minutes.</div>
                                        <div className="text-[10px] text-blue-500 font-bold mt-2 italic uppercase">Reaches {maxRpm} RPM at {timeToMax}m and holds.</div>
                                    </div>
                                </div>

                                <div className="space-y-4">
                                    <h3 className="text-xs font-black text-teal-500 tracking-[0.2em] uppercase border-b border-slate-800 pb-2">3. Cooldown (Optional)</h3>
                                    <div className="flex gap-4">
                                        <Picker label="TIME" value={cooldownMinutes} onDown={()=>setCooldownMinutes(m=>Math.max(0,m-1))} onUp={()=>setCooldownMinutes(m=>m+1)} unit="m"/>
                                        <Picker label="TARGET RPM" value={cooldownRpm} onDown={()=>setCooldownRpm(r=>Math.max(10,r-1))} onUp={()=>setCooldownRpm(r=>r+1)}/>
                                    </div>
                                </div>

                                <div className="text-center font-mono text-sm font-bold text-slate-500">Total Session: {warmupMinutes+totalMinutes+cooldownMinutes}m</div>
                                <button onClick={toggleStart} className="w-full bg-blue-600 hover:bg-blue-500 py-6 rounded-2xl font-black text-xl uppercase tracking-[0.1em] shadow-xl shadow-blue-900/20 transition-all">Start Workout</button>
                            </div>
                        )}

                        {!showSettings && !showHistory && (
                            <div className="flex-1 flex flex-col items-center justify-center p-6 space-y-12">
                                <div className="w-full max-w-md h-20 bg-slate-900/50 rounded-full relative overflow-hidden border border-slate-800/50">
                                   <div className="absolute left-6 top-1/2 -translate-y-1/2 text-[10px] font-black text-slate-600 uppercase tracking-widest">CATCH</div>
                                   <div className="absolute right-6 top-1/2 -translate-y-1/2 text-[10px] font-black text-slate-600 uppercase tracking-widest rotate-90">FINISH</div>
                                   <div className={`absolute top-1/2 -translate-y-1/2 h-10 w-10 rounded-xl flex items-center justify-center shadow-2xl transition-colors ${strokePhase < 0.33 ? 'bg-white' : splitColor}`}
                                        style={{ left: `calc(${strokePhase < 0.33 ? (strokePhase/0.33)*100 : 100-((strokePhase-0.33)/0.67)*100}% - 20px)` }}>
                                     <div className={`w-2 h-2 rounded-full ${strokePhase < 0.33 ? 'bg-slate-950' : 'bg-white'}`} />
                                   </div>
                                </div>

                                <div className="text-center">
                                    <div className="text-[35vmin] font-mono font-bold leading-none tracking-tighter">{displayRpm}</div>
                                    <div className="text-xs font-bold text-slate-500 uppercase tracking-[0.2em] mt-2">Target Strokes Per Minute</div>
                                    <div className={`mt-8 inline-block px-10 py-3 rounded-full text-sm font-black uppercase tracking-[0.2em] ${splitColor} text-white shadow-lg`}>{splitLabel}</div>
                                    <div className="text-[10px] font-bold text-slate-600 uppercase tracking-widest mt-6 italic">Preparing for {startRpm} RPM</div>
                                </div>

                                <div className="w-full max-w-md grid grid-cols-2 gap-4">
                                    <div className="bg-slate-900/40 p-6 rounded-2xl border border-slate-800 text-center">
                                        <div className="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2">Total Remaining</div>
                                        <div className="text-4xl font-mono font-bold text-blue-400 leading-none">{formatTime(absoluteTotalSeconds - currentTime)}</div>
                                    </div>
                                    <div className="bg-slate-900/40 p-6 rounded-2xl border border-slate-800 text-center">
                                        <div className="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2">Phase Time</div>
                                        <div className="text-4xl font-mono font-bold leading-none">{formatTime(splitTimeLeft)}</div>
                                    </div>
                                </div>

                                <div className="w-full max-w-md space-y-2 px-2">
                                    <div className="flex justify-between text-[10px] font-black text-slate-600 uppercase tracking-widest"><span>START</span><span>FINISH</span></div>
                                    <div className="w-full h-1 bg-slate-900 rounded-full relative overflow-hidden">
                                        <div className={`h-full ${splitColor} progress-transition`} style={{ width: `${(currentTime/absoluteTotalSeconds)*100}%` }} />
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>

                    <footer className="p-8 pb-12 flex justify-center items-center gap-10 bg-slate-950/80 backdrop-blur-md border-t border-slate-900 z-40 shrink-0">
                        <button onClick={() => setCurrentTime(0)} className="w-16 h-16 bg-slate-900 rounded-full flex items-center justify-center hover:bg-slate-800 transition-colors"><Icon name="RotateCcw" className="text-slate-500"/></button>
                        <button onClick={toggleStart} className={`w-24 h-24 rounded-full flex items-center justify-center shadow-2xl transition-all ${isRunning ? 'bg-white text-slate-950' : 'bg-blue-600 text-white'}`}>
                            {isRunning ? <Icon name="Pause" size={40}/> : <Icon name="Play" size={40} className="ml-1"/>}
                        </button>
                        <button onClick={() => setShowSettings(true)} className="w-16 h-16 bg-slate-900 rounded-full flex items-center justify-center hover:bg-slate-800 transition-colors"><Icon name="Clock" className="text-slate-500"/></button>
                    </footer>

                    <a href="https://ko-fi.com/G2G41N6HQ1" target="_blank" className="fixed bottom-6 right-6 z-50 bg-slate-900/90 border border-slate-800 p-3 rounded-full shadow-2xl hover:scale-110 transition-transform">
                        <Icon name="Coffee" size={20} className="text-slate-400"/>
                    </a>
                </div>
            );
        };

        function initApp() {
            if (typeof React !== 'undefined' && typeof ReactDOM !== 'undefined' && typeof Babel !== 'undefined') {
                ReactDOM.createRoot(document.getElementById('root')).render(<App />);
            } else setTimeout(initApp, 100);
        }
        window.onload = initApp;
    </script>
</body>
</html>
