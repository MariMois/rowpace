<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>RowPace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@700&display=swap');
        
        :root { --slate-950: #020617; }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--slate-950); 
            margin: 0; padding: 0; 
            -webkit-font-smoothing: antialiased;
            overscroll-behavior-y: contain;
            color: white;
        }

        .font-mono { font-family: 'JetBrains Mono', monospace; }

        html, body, #root { 
            height: 100%; width: 100%; 
            overflow: hidden; position: fixed; 
        }

        #root { display: flex; flex-direction: column; }

        .scroll-container { 
            flex: 1; 
            overflow-y: auto; 
            -webkit-overflow-scrolling: touch; 
        }

        .picker-btn { -webkit-tap-highlight-color: transparent; }

        /* Initial loading screen styling */
        #loading-screen {
            position: fixed; inset: 0;
            background: var(--slate-950);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 9999;
        }

        .progress-transition {
            transition: width 1s linear, background-color 0.3s ease;
        }
    </style>
</head>
<body>
    <div id="loading-screen">
        <div class="text-blue-500 animate-spin mb-4">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"></path></svg>
        </div>
        <div class="text-slate-500 font-bold tracking-widest text-xs uppercase">Initializing RowPace...</div>
    </div>

    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // Custom Icon Component for UMD Lucide
        const Icon = ({ name, className = "", size = 24, fill = "none" }) => {
            const ref = useRef(null);
            useEffect(() => {
                if (ref.current && window.lucide) {
                    const lucideName = name.replace(/([A-Z])/g, "-$1").toLowerCase().replace(/^-/, "");
                    ref.current.innerHTML = '';
                    const i = document.createElement('i');
                    i.setAttribute('data-lucide', lucideName);
                    ref.current.appendChild(i);
                    window.lucide.createIcons({
                        elements: [i],
                        attrs: { width: size, height: size, 'stroke-width': 2, fill: fill }
                    });
                }
            }, [name, size, fill]);
            return <span ref={ref} className={`inline-flex items-center justify-center ${className}`} style={{ width: size, height: size }} />;
        };

        const App = () => {
            // State from your App.tsx
            const [startRpm, setStartRpm] = useState(18);
            const [maxRpm, setMaxRpm] = useState(24);
            const [totalMinutes, setTotalMinutes] = useState(20);
            const [splitMinutes, setSplitMinutes] = useState(1);
            const [warmupMinutes, setWarmupMinutes] = useState(5);
            const [warmupRpm, setWarmupRpm] = useState(16);
            const [cooldownMinutes, setCooldownMinutes] = useState(5);
            const [cooldownRpm, setCooldownRpm] = useState(16);

            const [isRunning, setIsRunning] = useState(false);
            const [isCountingDown, setIsCountingDown] = useState(false);
            const [countdown, setCountdown] = useState(10);
            const [currentTime, setCurrentTime] = useState(0);
            const [showSettings, setShowSettings] = useState(true);
            const [showHistory, setShowHistory] = useState(false);
            const [history, setHistory] = useState([]);
            const [isMuted, setIsMuted] = useState(false);
            const [strokePhase, setStrokePhase] = useState(0);

            const requestRef = useRef();
            const lastTimeRef = useRef();
            const wakeLockRef = useRef(null);
            const audioCtxRef = useRef(null);
            const lastSplitRef = useRef(0);
            const phaseRef = useRef("WARMUP");
            const rpmStep = 2;

            // Logic from App.tsx
            const handleRpmChange = (type, delta) => {
                let newStart = startRpm;
                let newMax = maxRpm;
                if (type === "start") {
                    newStart = Math.max(10, startRpm + delta);
                    newMax = Math.max(newMax, newStart);
                } else {
                    newMax = Math.max(startRpm, maxRpm + delta);
                }
                setStartRpm(newStart);
                setMaxRpm(newMax);
                const cycles = Math.max(1, Math.ceil((newMax - newStart) / rpmStep) + 1);
                setTotalMinutes(cycles * splitMinutes * 2);
            };

            const playTone = (freq, duration, volume = 0.1, type = "sine") => {
                if (isMuted) return;
                try {
                    const ctx = audioCtxRef.current || (audioCtxRef.current = new (window.AudioContext || window.webkitAudioContext)());
                    if (ctx.state === 'suspended') ctx.resume();
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = type;
                    osc.frequency.setValueAtTime(freq, ctx.currentTime);
                    gain.gain.setValueAtTime(volume, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + duration);
                    osc.connect(gain); gain.connect(ctx.destination);
                    osc.start(); osc.stop(ctx.currentTime + duration);
                } catch(e) {}
            };

            const soundCatch = () => playTone(800, 0.1, 0.2, "square");
            const soundPush = () => { playTone(500, 0.2); setTimeout(() => playTone(700, 0.2), 100); };
            const soundEnd = () => [440, 554, 659, 880].forEach((f, i) => setTimeout(() => playTone(f, 0.6, 0.1, "triangle"), i * 150));

            const warmupSeconds = warmupMinutes * 60;
            const mainSeconds = totalMinutes * 60;
            const cooldownSeconds = cooldownMinutes * 60;
            const absoluteTotalSeconds = warmupSeconds + mainSeconds + cooldownSeconds;
            const splitSeconds = splitMinutes * 60;

            const calculateRpmForSplit = (splitIdx) => {
                const pairIdx = Math.floor(splitIdx / 2);
                return Math.min(startRpm + pairIdx * rpmStep, maxRpm);
            };

            // Derive Phase Data
            let currentPhase = "MAIN";
            let displayRpm = startRpm;
            let nextDisplayRpm = startRpm;
            let splitLabel = "";
            let splitColorClass = "bg-blue-600";
            let splitTimeLeft = 0;
            let activeSplitIndex = 0;

            if (currentTime < warmupSeconds && warmupSeconds > 0) {
                currentPhase = "WARMUP"; displayRpm = warmupRpm; nextDisplayRpm = startRpm; splitLabel = "Warmup"; splitColorClass = "bg-emerald-600"; splitTimeLeft = warmupSeconds - currentTime;
            } else if (currentTime < warmupSeconds + mainSeconds) {
                currentPhase = "MAIN";
                const mainTime = currentTime - warmupSeconds;
                activeSplitIndex = Math.floor(mainTime / splitSeconds);
                displayRpm = calculateRpmForSplit(activeSplitIndex);
                const isLastMainSplit = mainTime >= mainSeconds - splitSeconds;
                nextDisplayRpm = isLastMainSplit ? (cooldownMinutes > 0 ? cooldownRpm : displayRpm) : calculateRpmForSplit(activeSplitIndex + 1);
                const isHard = activeSplitIndex % 2 !== 0;
                splitLabel = isHard ? "Hard Drive" : "Low Steady";
                splitColorClass = isHard ? "bg-orange-600" : "bg-blue-600";
                splitTimeLeft = splitSeconds - (mainTime % splitSeconds);
            } else {
                currentPhase = "COOLDOWN"; displayRpm = cooldownRpm; nextDisplayRpm = cooldownRpm; splitLabel = "Cooldown"; splitColorClass = "bg-teal-600"; splitTimeLeft = absoluteTotalSeconds - currentTime;
            }

            const strokeDuration = 60 / displayRpm;
            const timeToMax = Math.max(1, Math.ceil((maxRpm - startRpm) / rpmStep) + 1) * splitMinutes * 2;

            const saveSession = useCallback(() => {
                soundEnd();
                const newEntry = { id: Date.now(), date: new Date().toLocaleDateString(), duration: Math.round(absoluteTotalSeconds / 60), range: `${startRpm}-${maxRpm}` };
                const updated = [newEntry, ...history].slice(0, 50);
                setHistory(updated);
                localStorage.setItem("rowpace_history", JSON.stringify(updated));
            }, [history, absoluteTotalSeconds, startRpm, maxRpm]);

            useEffect(() => {
                if (isRunning && currentTime > 0 && currentTime >= absoluteTotalSeconds) {
                    setIsRunning(false); setCurrentTime(absoluteTotalSeconds); saveSession();
                }
            }, [currentTime, isRunning, absoluteTotalSeconds, saveSession]);

            const animate = useCallback((time) => {
                if (lastTimeRef.current !== undefined) {
                    const deltaTime = (time - lastTimeRef.current) / 1000;
                    setCurrentTime((prev) => Math.min(prev + deltaTime, absoluteTotalSeconds));
                    setStrokePhase((prev) => {
                        const next = (prev + deltaTime / strokeDuration) % 1;
                        if (next < prev) soundCatch();
                        return next;
                    });
                }
                lastTimeRef.current = time;
                requestRef.current = requestAnimationFrame(animate);
            }, [strokeDuration, absoluteTotalSeconds]);

            useEffect(() => {
                if (isRunning && !isCountingDown) requestRef.current = requestAnimationFrame(animate);
                else { cancelAnimationFrame(requestRef.current); lastTimeRef.current = undefined; }
                return () => cancelAnimationFrame(requestRef.current);
            }, [isRunning, isCountingDown, animate]);

            useEffect(() => {
                if (isRunning) {
                    if (currentPhase !== phaseRef.current) { soundPush(); phaseRef.current = currentPhase; }
                    else if (currentPhase === "MAIN" && activeSplitIndex !== lastSplitRef.current) { soundPush(); lastSplitRef.current = activeSplitIndex; }
                }
            }, [currentPhase, activeSplitIndex, isRunning]);

            useEffect(() => {
                const saved = localStorage.getItem("rowpace_history");
                if (saved) setHistory(JSON.parse(saved));
                // Remove loading screen once React has mounted
                const loader = document.getElementById('loading-screen');
                if (loader) loader.style.display = 'none';
            }, []);

            useEffect(() => {
                let t;
                if (isCountingDown && countdown > 0) {
                    if (countdown <= 5) playTone(440, 0.1);
                    t = setInterval(() => setCountdown((c) => c - 1), 1000);
                } else if (isCountingDown && countdown === 0) {
                    soundCatch(); setIsCountingDown(false); setIsRunning(true);
                }
                return () => clearInterval(t);
            }, [isCountingDown, countdown]);

            const toggleStart = () => {
                if (isRunning || isCountingDown) { setIsRunning(false); setIsCountingDown(false); }
                else {
                    if (currentTime === 0 || currentTime >= absoluteTotalSeconds) {
                        setCurrentTime(0); setCountdown(10); setIsCountingDown(true); setShowSettings(false); setShowHistory(false);
                    } else { setIsRunning(true); setShowSettings(false); }
                }
            };

            const formatTime = (s) => `${Math.floor(s / 60)}:${Math.floor(s % 60).toString().padStart(2, "0")}`;
            const getPosition = (p) => p < 0.33 ? (p / 0.33) * 100 : 100 - ((p - 0.33) / 0.67) * 100;

            const Picker = ({ label, value, onDown, onUp, unit = "" }) => (
                <div className="space-y-1 md:space-y-2">
                    <label className="text-[10px] md:text-xs font-bold text-slate-500 uppercase tracking-wider">{label}</label>
                    <div className="flex items-center justify-between bg-slate-900 rounded-2xl border border-slate-800">
                        <button onClick={onDown} className="p-3 md:p-4 hover:bg-slate-800 rounded-l-2xl transition-colors"><Icon name="ChevronDown" /></button>
                        <span className="text-xl md:text-2xl font-mono font-bold tracking-tight">{value}{unit}</span>
                        <button onClick={onUp} className="p-3 md:p-4 hover:bg-slate-800 rounded-r-2xl transition-colors"><Icon name="ChevronUp" /></button>
                    </div>
                </div>
            );

            return (
                <div className="flex flex-col h-full w-full bg-slate-950 overflow-hidden relative">
                    <header className="p-4 md:p-6 flex justify-between items-center border-b border-slate-800 bg-slate-900/30 backdrop-blur-md shrink-0 z-30">
                        <div className="flex items-center gap-2">
                            <Icon name="Activity" className="text-blue-500" size={32} />
                            <h1 className="text-xl md:text-2xl font-bold tracking-tight">RowPace</h1>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={() => setIsMuted(!isMuted)} className="p-2 md:p-3 hover:bg-slate-800 rounded-xl transition-colors">{isMuted ? <Icon name="VolumeX" className="text-red-500" /> : <Icon name="Volume2" />}</button>
                            <button onClick={() => { setShowHistory(!showHistory); setShowSettings(false); }} className="p-2 md:p-3 hover:bg-slate-800 rounded-xl transition-colors"><Icon name="History" /></button>
                            <button onClick={() => { setShowSettings(!showSettings); setShowHistory(false); }} className="p-2 md:p-3 hover:bg-slate-800 rounded-xl transition-colors"><Icon name="Settings" /></button>
                        </div>
                    </header>

                    <div className="scroll-container relative flex flex-col">
                        {isCountingDown && (
                            <div className="fixed inset-0 z-50 bg-blue-600 flex flex-col items-center justify-center">
                                <div className="text-lg md:text-2xl uppercase tracking-widest font-black mb-4 opacity-80">Get Ready</div>
                                <div className="text-[40vmin] font-mono font-black leading-none">{countdown}</div>
                            </div>
                        )}

                        {showSettings && (
                            <div className="p-6 md:p-8 space-y-8 max-w-2xl mx-auto w-full pb-40">
                                <h2 className="text-3xl md:text-5xl font-black text-center mt-4">Session Setup</h2>
                                
                                <div className="space-y-4">
                                    <div className="text-[10px] md:text-xs font-black text-emerald-500 tracking-[0.2em] uppercase border-b border-slate-800 pb-2">1. Warmup (Optional)</div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <Picker label="Time" value={warmupMinutes} onDown={() => setWarmupMinutes(m => Math.max(0, m - 1))} onUp={() => setWarmupMinutes(m => m + 1)} unit="m" />
                                        <Picker label="Target RPM" value={warmupRpm} onDown={() => setWarmupRpm(r => Math.max(10, r - 1))} onUp={() => setWarmupRpm(r => r + 1)} />
                                    </div>
                                </div>

                                <div className="space-y-4">
                                    <div className="text-[10px] md:text-xs font-black text-blue-500 tracking-[0.2em] uppercase border-b border-slate-800 pb-2">2. Main Workout</div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <Picker label="Start RPM" value={startRpm} onDown={() => handleRpmChange("start", -2)} onUp={() => handleRpmChange("start", 2)} />
                                        <Picker label="Max RPM" value={maxRpm} onDown={() => handleRpmChange("max", -2)} onUp={() => handleRpmChange("max", 2)} />
                                    </div>
                                    <Picker label="Main Duration" value={totalMinutes} onDown={() => setTotalMinutes(m => Math.max(2, m - 1))} onUp={() => setTotalMinutes(m => m + 1)} unit="m" />
                                    <div className="p-5 bg-blue-500/5 border border-blue-500/20 rounded-2xl text-center">
                                        <div className="flex items-center justify-center gap-2 text-blue-400 font-bold text-xs uppercase mb-2"><Icon name="TrendingUp" size={16} /> Progression Details</div>
                                        <div className="text-xs text-slate-400">Main RPM increases by <span className="text-white font-bold">+{rpmStep}</span> every 2 minutes.</div>
                                        <div className={`text-[10px] md:text-xs mt-2 font-bold ${totalMinutes < timeToMax ? "text-orange-400" : "text-blue-400"}`}>
                                            {totalMinutes < timeToMax ? `Note: Workout ends early at ${Math.min(maxRpm, startRpm + Math.floor((Math.max(1, totalMinutes) - 1) / (splitMinutes * 2)) * rpmStep)} RPM.` : totalMinutes === timeToMax ? `Perfect fit: Ends exactly at ${maxRpm} RPM.` : `Reaches ${maxRpm} RPM at ${timeToMax}m and holds.`}
                                        </div>
                                    </div>
                                </div>

                                <div className="space-y-4">
                                    <div className="text-[10px] md:text-xs font-black text-teal-500 tracking-[0.2em] uppercase border-b border-slate-800 pb-2">3. Cooldown (Optional)</div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <Picker label="Time" value={cooldownMinutes} onDown={() => setCooldownMinutes(m => Math.max(0, m - 1))} onUp={() => setCooldownMinutes(m => m + 1)} unit="m" />
                                        <Picker label="Target RPM" value={cooldownRpm} onDown={() => setCooldownRpm(r => Math.max(10, r - 1))} onUp={() => setCooldownRpm(r => r + 1)} />
                                    </div>
                                </div>

                                <div className="text-center font-mono text-sm font-bold text-slate-500">Total Session: {warmupMinutes + totalMinutes + cooldownMinutes}m</div>
                                <button onClick={toggleStart} className="w-full bg-blue-600 hover:bg-blue-500 py-6 rounded-2xl font-black text-xl uppercase tracking-widest shadow-xl shadow-blue-900/20 transition-all">Start Workout</button>
                            </div>
                        )}

                        {showHistory && (
                            <div className="p-8 max-w-2xl mx-auto w-full pb-40">
                                <h2 className="text-3xl md:text-5xl font-black mb-10 text-center">History</h2>
                                <div className="space-y-4">
                                    {history.length === 0 ? <div className="text-slate-500 text-center py-20 italic">No records found</div> : history.map((item) => (
                                        <div key={item.id} className="bg-slate-900/50 p-6 rounded-2xl flex justify-between items-center border border-slate-800">
                                            <div><div className="font-bold text-lg">{item.date}</div><div className="text-sm text-blue-400 uppercase font-bold tracking-wider">{item.range} RPM</div></div>
                                            <div className="text-3xl font-mono font-bold text-slate-300">{item.duration}m</div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {!showSettings && !showHistory && (
                            <div className="flex-1 flex flex-col items-center justify-center p-6 space-y-12">
                                {/* Boat Slider */}
                                <div className="w-full max-w-md h-20 bg-slate-900/40 rounded-full relative overflow-hidden border border-slate-800/50 shrink-0">
                                   <div className="absolute left-6 top-1/2 -translate-y-1/2 text-[10px] font-black text-slate-600 uppercase tracking-[0.2em]">CATCH</div>
                                   <div className="absolute right-6 top-1/2 -translate-y-1/2 text-[10px] font-black text-slate-600 uppercase tracking-[0.2em] rotate-90">FINISH</div>
                                   <div className={`absolute top-1/2 -translate-y-1/2 h-12 w-12 rounded-2xl flex items-center justify-center shadow-2xl transition-colors ${strokePhase < 0.33 ? 'bg-white' : splitColorClass}`}
                                        style={{ left: `calc(${getPosition(strokePhase)}% - 3rem * ${getPosition(strokePhase) / 100})` }}>
                                     <div className={`w-3 h-3 rounded-full ${strokePhase < 0.33 ? 'bg-slate-950' : 'bg-white'}`} />
                                   </div>
                                </div>

                                {/* RPM Display */}
                                <div className="text-center">
                                    <div className="text-[35vmin] font-mono font-bold leading-none tracking-tighter">{displayRpm}</div>
                                    <div className="text-xs font-bold text-slate-500 uppercase tracking-[0.3em] mt-2">Target Strokes Per Minute</div>
                                    <div className={`mt-8 inline-block px-10 py-3 rounded-full text-sm font-black uppercase tracking-widest ${splitColorClass} text-white shadow-lg`}>{splitLabel}</div>
                                    <div className="text-[10px] font-bold text-slate-600 uppercase tracking-widest mt-6 italic opacity-50">Preparing for {nextDisplayRpm} RPM</div>
                                </div>

                                {/* Stats Grid */}
                                <div className="w-full max-w-md grid grid-cols-2 gap-4">
                                    <div className="bg-slate-900/30 p-6 rounded-3xl border border-slate-800/50 text-center">
                                        <div className="text-slate-500 text-[10px] uppercase font-bold mb-2 tracking-widest">Remaining</div>
                                        <div className="text-4xl md:text-6xl font-mono font-bold text-blue-400">{formatTime(absoluteTotalSeconds - currentTime)}</div>
                                    </div>
                                    <div className="bg-slate-900/30 p-6 rounded-3xl border border-slate-800/50 text-center">
                                        <div className="text-slate-500 text-[10px] uppercase font-bold mb-2 tracking-widest">Phase Time</div>
                                        <div className="text-4xl md:text-6xl font-mono font-bold">{formatTime(splitTimeLeft)}</div>
                                    </div>
                                </div>

                                {/* Session Progress Bar */}
                                <div className="w-full max-w-md px-2 space-y-3">
                                    <div className="flex justify-between text-[10px] font-black text-slate-700 uppercase tracking-[0.2em]"><span>START</span><span>{Math.round((currentTime / absoluteTotalSeconds) * 100)}%</span><span>FINISH</span></div>
                                    <div className="w-full h-1.5 bg-slate-900 rounded-full relative overflow-hidden">
                                        <div className={`absolute inset-y-0 left-0 ${splitColorClass} transition-all duration-500`} style={{ width: `${(currentTime / absoluteTotalSeconds) * 100}%` }} />
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>

                    {!showSettings && !showHistory && (
                        <footer className="p-8 pb-12 flex justify-center items-center gap-10 bg-slate-950/80 backdrop-blur-md border-t border-slate-900 shrink-0 z-40">
                            <button onClick={() => { setCurrentTime(0); setStrokePhase(0); }} className="p-5 bg-slate-900 hover:bg-slate-800 transition-colors rounded-3xl"><Icon name="RotateCcw" className="text-slate-500" /></button>
                            <button onClick={toggleStart} className={`w-24 h-24 rounded-full flex items-center justify-center shadow-2xl transition-all ${isRunning ? 'bg-white text-slate-900' : 'bg-blue-600 text-white'}`}>
                                {isRunning ? <Icon name="Pause" size={40} fill="currentColor" /> : <Icon name="Play" size={40} fill="currentColor" className="ml-1.5" />}
                            </button>
                            <button onClick={() => setShowSettings(true)} className="p-5 bg-slate-900 hover:bg-slate-800 transition-colors rounded-3xl"><Icon name="Clock" className="text-slate-500" /></button>
                        </footer>
                    )}

                    <div className="fixed bottom-6 right-6 z-50">
                        <a href="https://ko-fi.com/G2G41N6HQ1" target="_blank" className="bg-slate-900/90 border border-slate-800 text-slate-400 p-3.5 rounded-full shadow-2xl hover:scale-110 transition-transform flex items-center justify-center" title="Buy me a Coffee">
                            <Icon name="Coffee" size={20} />
                        </a>
                    </div>
                </div>
            );
        };

        function initApp() {
            if (typeof React !== 'undefined' && typeof ReactDOM !== 'undefined' && typeof Babel !== 'undefined') {
                const root = ReactDOM.createRoot(document.getElementById('root'));
                root.render(<App />);
            } else setTimeout(initApp, 100);
        }
        window.onload = initApp;
    </script>
</body>
</html>
